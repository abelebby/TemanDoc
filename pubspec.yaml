name: doctor_portal
description: "TemanU Doctor Portal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  flutter_dotenv: ^6.0.0
  google_fonts: ^8.0.2
  file_picker: ^8.0.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  file_saver: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - .env
